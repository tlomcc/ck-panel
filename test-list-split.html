<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>列表分段测试</title>
<style>
body{font-family:sans-serif;padding:20px;max-width:800px;margin:0 auto}
.test-case{margin:20px 0;padding:15px;border:1px solid #ccc;border-radius:8px}
.test-case h3{margin-top:0}
.input{background:#f5f5f5;padding:10px;white-space:pre-wrap;font-family:monospace;font-size:12px;margin:10px 0}
.output{background:#e8f5e9;padding:10px;margin:10px 0}
.output-item{border:1px solid #4caf50;padding:8px;margin:5px 0;border-radius:4px}
.result{font-weight:bold;margin-top:10px}
.pass{color:green}
.fail{color:red}
</style>
</head>
<body>
<h1>CK 面板列表分段逻辑测试</h1>

<div id="tests"></div>

<script>
function chatNaturalTextLen(text){
  var len=String(text||'').replace(/\s+/g,'').length;
  return len;
}

function chatNaturalUnits(text){
  var paragraphs=String(text||'').replace(/\r\n/g,'\n').split(/\n{2,}/).map(function(x){return x.trim()}).filter(Boolean);
  if(paragraphs.length>1){
    var usable=paragraphs.every(function(p){var len=chatNaturalTextLen(p);return len>=8&&len<=180});
    if(usable)return paragraphs;
  }
  var units=[];
  var lines=String(text||'').split(/\n+/);
  var i=0;
  while(i<lines.length){
    var line=lines[i].trim();
    if(!line){i++;continue;}
    var isOrderedListItem=/^(\d+[.、])\s*/.test(line);
    var isUnorderedListItem=/^[-*]\s/.test(line);
    if(isOrderedListItem||isUnorderedListItem){
      var listBlock=[line];
      var j=i+1;
      while(j<lines.length){
        var nextLine=lines[j].trim();
        if(!nextLine){j++;continue;}
        var nextIsOrdered=/^(\d+[.、])\s*/.test(nextLine);
        var nextIsUnordered=/^[-*]\s/.test(nextLine);
        if((isOrderedListItem&&nextIsOrdered)||(isUnorderedListItem&&nextIsUnordered)){
          listBlock.push(nextLine);
          j++;
        }else{
          break;
        }
      }
      units.push(listBlock.join('\n'));
      i=j;
    }else{
      var parts=line.match(/[^。！？!?；;…]+[。！？!?；;…]*/g)||[line];
      parts.forEach(function(p){
        p=p.trim();
        if(p)units.push(p);
      });
      i++;
    }
  }
  return units.length?units:[String(text||'').trim()];
}

var testCases=[
  {
    name:'有序列表（点号）',
    input:'1. 第一项\n2. 第二项\n3. 第三项',
    expectOneUnit:true,
    expectContains:['1. 第一项','2. 第二项','3. 第三项']
  },
  {
    name:'有序列表（顿号）',
    input:'1、第一项\n2、第二项\n3、第三项',
    expectOneUnit:true,
    expectContains:['1、第一项','2、第二项','3、第三项']
  },
  {
    name:'无序列表（短横线）',
    input:'- 苹果\n- 香蕉\n- 橙子',
    expectOneUnit:true,
    expectContains:['- 苹果','- 香蕉','- 橙子']
  },
  {
    name:'无序列表（星号）',
    input:'* 项目A\n* 项目B\n* 项目C',
    expectOneUnit:true,
    expectContains:['* 项目A','* 项目B','* 项目C']
  },
  {
    name:'列表前后有普通文本',
    input:'这是开头。\n\n1. 第一项\n2. 第二项\n3. 第三项\n\n这是结尾。',
    expectMultiUnit:true
  },
  {
    name:'普通段落（不受影响）',
    input:'第一段文字。\n\n第二段文字。',
    expectMultiUnit:true
  },
  {
    name:'普通单行（不受影响）',
    input:'这是一行普通文字。',
    expectOneUnit:true
  }
];

var container=document.getElementById('tests');
testCases.forEach(function(tc){
  var result=chatNaturalUnits(tc.input);
  var pass=true;
  var reason='';

  if(tc.expectOneUnit&&result.length!==1){
    pass=false;
    reason='期望1个单元，实际'+result.length+'个';
  }

  if(tc.expectMultiUnit&&result.length<=1){
    pass=false;
    reason='期望多个单元，实际'+result.length+'个';
  }

  if(tc.expectContains){
    var firstUnit=result[0]||'';
    tc.expectContains.forEach(function(str){
      if(firstUnit.indexOf(str)===-1){
        pass=false;
        reason='期望包含"'+str+'"，但未找到';
      }
    });
  }

  var div=document.createElement('div');
  div.className='test-case';
  div.innerHTML='<h3>'+tc.name+'</h3>'+
    '<div class="input">'+tc.input.replace(/\n/g,'<br>')+'</div>'+
    '<div class="output">'+
      '<strong>分段结果（'+result.length+'个单元）：</strong>'+
      result.map(function(u,i){
        return '<div class="output-item"><strong>单元'+(i+1)+':</strong><br>'+u.replace(/\n/g,'<br>')+'</div>';
      }).join('')+
    '</div>'+
    '<div class="result '+(pass?'pass':'fail')+'">'+
      (pass?'✓ 通过':'✗ 失败: '+reason)+
    '</div>';
  container.appendChild(div);
});
</script>
</body>
</html>
