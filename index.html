<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>CK · 此刻</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="loading-bar-wrap" id="loading-wrap"><div class="loading-bar"><div class="loading-bar-inner" id="loading-inner"></div></div><div class="loading-text" id="loading-text">加载中...</div></div>
<div class="page active" id="page-memory">
<div class="ck-brand"><h1><span>CK</span> · 此刻</h1><p>C = Caicai · K = Ke · 记录每一个此刻</p></div>
<div class="mem-header"><div class="mem-title">Memory<span class="cn">记忆</span></div><div class="mem-date" id="mem-date"></div></div>
<div class="day-card"><h2>Day <span id="day-num">0</span></h2><p>Since 2026.3.26</p></div>
<div class="stats-row"><div class="stat-box"><div class="val" id="st-total">-</div><div class="lbl">总数</div></div><div class="stat-box"><div class="val" id="st-active">-</div><div class="lbl">活跃</div></div><div class="stat-box"><div class="val" id="st-archived">-</div><div class="lbl">归档</div></div></div>
<div class="home-console">
<div class="console-head"><div><span>控制台</span><small id="console-sub">Memory Console</small></div><button class="btn btn-outline btn-sm" onclick="loadEntityGraph(true)">信息网</button></div>
<div class="console-grid">
<div class="console-card"><div class="console-card-title">最近更新</div><div id="recent-list" class="mini-list"><div class="empty-state small">加载中...</div></div></div>
<div class="console-card"><div class="console-card-title">重点记忆</div><div id="important-list" class="mini-list"><div class="empty-state small">加载中...</div></div></div>
<div class="console-card"><div class="console-card-title">待整理</div><div id="cleanup-list" class="mini-list"><div class="empty-state small">加载中...</div></div></div>
</div>
<div class="entity-console" id="entity-console" style="display:none">
<div class="entity-head"><div><strong>信息网</strong><small id="entity-updated"></small></div><div class="entity-actions"><a class="entity-open" id="entity-open" target="_blank" rel="noopener">打开完整</a><button class="entity-close" onclick="hideEntityGraph()">收起</button></div></div>
<div class="entity-stats" id="entity-stats"></div>
<div class="entity-columns"><div><div class="console-card-title">重要节点</div><div id="entity-nodes" class="mini-list"></div></div><div><div class="console-card-title">最近关系</div><div id="entity-relations" class="mini-list"></div></div></div>
</div>
</div>
<div class="search-wrap"><input id="search-input" placeholder="搜索记忆..." oninput="onSearch()" /><button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button></div>
<div id="search-results" class="search-results" style="display:none"></div>
<div class="tags-bar" id="tags-bar"></div>
<div class="tags-bar-actions" id="tags-actions"><button class="tag-expand-btn" onclick="toggleTagsExpand()">展开</button><button class="tag-clear-btn" id="tag-clear" onclick="filterByTag('')">清除</button></div>
<div class="section-label"><span>分类</span><span><button class="btn btn-blue btn-sm" onclick="showModal()">+ 新增</button> <button class="theme-toggle" onclick="toggleTheme()" style="border:none;background:none;font-size:18px;cursor:pointer">🌙</button></span></div>
<div class="cat-grid" id="cat-grid"><div class="empty-state">加载中...</div></div>
</div>
<div class="page" id="page-detail" style="position:relative">
<button class="back-btn" onclick="goMemory()">← 返回</button>
<div class="detail-top"><div><h3 id="d-title"></h3><small id="d-sub"></small></div><div class="menu-btn" onclick="toggleMenu()">☰</div></div>
<div class="menu-popup" id="menu-popup"><div class="menu-popup-item" onclick="startSelect('export')">批量导出</div><div class="menu-popup-item" onclick="startSelect('delete')">批量删除</div><div class="menu-popup-item" onclick="showRename()">重命名</div><div class="menu-popup-item danger" onclick="delCategory()">删除分类</div></div>
<div class="switch-bar"><div class="switch-item active" onclick="switchView('active')">活跃 <span id="active-count"></span></div><div class="switch-item" onclick="switchView('archived')">归档 <span id="archived-count"></span></div></div>
<div class="sort-bar"><button class="sort-btn active" data-sort="time" onclick="switchSort('time')">按时间</button><button class="sort-btn" data-sort="weight" onclick="switchSort('weight')">按权重</button></div>
<div class="select-bar" id="select-bar"><div style="display:flex;gap:12px;align-items:center"><span style="font-size:12px;color:#43a047;cursor:pointer;font-weight:600" onclick="selectAll()">全选</span><span style="font-size:12px;color:#8c939e;cursor:pointer" onclick="cancelSelect()">取消</span></div><button class="btn btn-sm" id="select-action-btn" onclick="doSelectAction()"></button></div>
<div class="entry-list" id="d-entries"></div>
<div class="add-area"><textarea id="add-input" placeholder="写一条新记忆..." oninput="updateCount()"></textarea><div class="add-area-foot"><span class="add-area-count" id="char-count">0 字</span><div class="add-area-options"><select id="add-imp"><option value="5">重要性:5</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5" selected>5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option></select><input id="add-tags" placeholder="标签" style="width:80px;padding:4px 8px;border:1px solid #e4e8ed;border-radius:6px;font-size:11px" /><button class="btn btn-blue btn-sm" onclick="addEntry()">添加</button></div></div></div>
</div>
<div class="modal-bg" id="newModal" onclick="hideModal()"><div class="modal" onclick="event.stopPropagation()"><h3>新增分类</h3><input id="new-name" placeholder="分类名称" /><div class="modal-btns"><button class="btn btn-outline btn-sm" onclick="hideModal()">取消</button><button class="btn btn-blue btn-sm" onclick="createCat()">创建</button></div></div></div>
<div class="modal-bg" id="renameModal" onclick="hideRename()"><div class="modal" onclick="event.stopPropagation()"><h3>重命名</h3><input id="rename-input" placeholder="新名称" /><div class="modal-btns"><button class="btn btn-outline btn-sm" onclick="hideRename()">取消</button><button class="btn btn-blue btn-sm" onclick="doRename()">保存</button></div></div></div>
<div class="modal-bg" id="editModal" onclick="hideEdit()"><div class="modal" onclick="event.stopPropagation()"><h3>编辑</h3><textarea id="edit-content" placeholder="内容"></textarea><div class="modal-row"><div><label style="font-size:11px;color:#8c939e">重要性</label><select id="edit-imp"></select></div><div><label style="font-size:11px;color:#8c939e">置顶</label><select id="edit-pin"><option value="0">否</option><option value="1">★ 是</option></select></div></div><div style="margin-top:10px"><label style="font-size:11px;color:#8c939e">标签</label><input id="edit-tags" placeholder="逗号分隔" /></div><div><label style="font-size:11px;color:#8c939e">归档</label><select id="edit-archived"><option value="0">否</option><option value="1">是</option></select></div><div class="modal-btns"><button class="btn btn-outline btn-sm" onclick="hideEdit()">取消</button><button class="btn btn-blue btn-sm" onclick="saveEdit()">保存</button></div></div></div>
<div class="confirm-bg" id="confirmDel"><div class="confirm-box"><p>确定删除？</p><div class="confirm-box-btns"><button class="btn btn-outline btn-sm" onclick="cancelDel()">取消</button><button class="btn btn-red btn-sm" onclick="confirmDel()">删除</button></div></div></div>
<div class="toast" id="toast"></div>
<script src="script.js"></script>
<script src="script-extra.js"></script>
</body>
</html>
