<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>加号面板翻页测试</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;padding:20px;background:#f5f5f5}
.test-container{max-width:400px;margin:0 auto;background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
h1{font-size:18px;margin-bottom:20px;text-align:center}
.chat-compose-mock{background:#f9f9f9;border-radius:12px;padding:10px;margin-bottom:10px}
.chat-plus-btn{
  width:36px;height:36px;border-radius:8px;border:1px solid #ccc;
  background:#fff;cursor:pointer;font-size:20px;margin-bottom:10px;display:block;
}
.chat-plus-btn.open{background:#e8f5e9;color:#128c4c}
.chat-plus-panel{
  position:relative;display:flex;flex-direction:column;
  max-height:0;opacity:0;overflow:hidden;
  transition:max-height .18s ease,opacity .16s ease;
  background:#fff;border-radius:12px;
}
.chat-plus-panel.open{
  max-height:240px;opacity:1;padding:10px 0;
}
.chat-plus-pages{
  display:flex;overflow-x:auto;overflow-y:hidden;
  scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;flex:1;min-height:0;
}
.chat-plus-pages::-webkit-scrollbar{display:none}
.chat-plus-page{
  flex:none;width:100%;min-width:100%;
  display:grid;grid-template-columns:repeat(4,minmax(0,1fr));
  grid-template-rows:repeat(2,1fr);gap:10px;
  scroll-snap-align:start;padding:0 10px;
}
.chat-plus-panel button{
  min-width:0;height:68px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;
  border:0;border-radius:12px;background:#fff;cursor:pointer;
  transition:background .16s ease;
}
.chat-plus-panel button:hover{background:#f0f0f0}
.chat-plus-panel button span{
  width:40px;height:40px;display:flex;align-items:center;
  justify-content:center;border-radius:10px;
  background:#f5f5f5;color:#07c160;font-size:18px;
}
.chat-plus-panel button b{font-size:13px;color:#333;font-weight:500}
.chat-plus-dots{
  display:flex;justify-content:center;align-items:center;
  gap:6px;padding:8px 0 2px;min-height:20px;
}
.chat-plus-dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(15,23,42,.2);
  transition:background .2s ease,transform .2s ease;
}
.chat-plus-dot.active{
  background:rgba(7,193,96,.72);
  transform:scale(1.2);
}
.status{margin-top:20px;padding:10px;background:#f0f0f0;border-radius:8px;font-size:14px}
</style>
</head>
<body>
<div class="test-container">
<h1>加号面板翻页测试</h1>
<div class="chat-compose-mock">
<button class="chat-plus-btn" id="toggle-btn" onclick="toggle()">＋</button>
<div class="chat-plus-panel" id="panel">
<div class="chat-plus-pages" id="pages">
<div class="chat-plus-page">
<button><span>▧</span><b>相册</b></button>
<button><span>◌</span><b>拍照</b></button>
<button><span>▤</span><b>上传文件</b></button>
<button><span>◉</span><b>提示词</b></button>
<button><span>⌁</span><b>网关</b></button>
<button><span>□</span><b>世界书</b></button>
<button><span>◇</span><b>记忆</b></button>
<button><span>☷</span><b>分条</b></button>
</div>
<div class="chat-plus-page">
<button><span>↧</span><b>截断</b></button>
<button><span>※</span><b>调试</b></button>
<button><span>⌫</span><b>清理</b></button>
</div>
</div>
<div class="chat-plus-dots" id="dots"></div>
</div>
</div>
<div class="status" id="status">点击加号按钮展开面板</div>
</div>

<script>
function updateDots(){
  var container=document.getElementById('pages');
  var dotsWrap=document.getElementById('dots');
  if(!container||!dotsWrap)return;
  var pages=container.querySelectorAll('.chat-plus-page');
  var totalPages=pages.length;
  if(totalPages<=1){
    dotsWrap.innerHTML='';
    return;
  }
  var scrollLeft=container.scrollLeft;
  var pageWidth=container.offsetWidth;
  var currentPage=Math.round(scrollLeft/pageWidth);
  currentPage=Math.max(0,Math.min(totalPages-1,currentPage));
  var dots=[];
  for(var i=0;i<totalPages;i++){
    dots.push('<div class="chat-plus-dot'+(i===currentPage?' active':'')+'"></div>');
  }
  dotsWrap.innerHTML=dots.join('');
  document.getElementById('status').textContent='当前第 '+(currentPage+1)+' 页，共 '+totalPages+' 页';
}

function toggle(){
  var panel=document.getElementById('panel');
  var btn=document.getElementById('toggle-btn');
  var open=!panel.classList.contains('open');
  panel.classList.toggle('open',open);
  btn.classList.toggle('open',open);
  btn.textContent=open?'×':'＋';
  if(open)updateDots();
}

document.getElementById('pages').addEventListener('scroll',updateDots,{passive:true});
</script>
</body>
</html>
